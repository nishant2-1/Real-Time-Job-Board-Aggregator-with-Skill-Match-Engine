services:
  - type: web
    name: jobrador-api
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: jobrador-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: jobrador-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: jobrador-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: jobrador-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: GREENHOUSE_BOARDS
        value: ""
      - key: LEVER_COMPANIES
        value: ""
      - key: RATE_LIMIT_DEFAULT
        value: 60/minute
      - key: SCRAPE_INTERVAL_MINUTES
        value: "30"
      - key: SCRAPER_TIMEOUT_SECONDS
        value: "20"
      - key: MAX_RESUME_UPLOAD_BYTES
        value: "5242880"
      - key: MATCH_CACHE_TTL_SECONDS
        value: "3600"

  - type: worker
    name: jobrador-worker
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: jobrador-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: jobrador-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: jobrador-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: jobrador-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: GREENHOUSE_BOARDS
        value: ""
      - key: LEVER_COMPANIES
        value: ""
      - key: RATE_LIMIT_DEFAULT
        value: 60/minute
      - key: SCRAPE_INTERVAL_MINUTES
        value: "30"
      - key: SCRAPER_TIMEOUT_SECONDS
        value: "20"
      - key: MAX_RESUME_UPLOAD_BYTES
        value: "5242880"
      - key: MATCH_CACHE_TTL_SECONDS
        value: "3600"

  - type: worker
    name: jobrador-beat
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: celery -A app.tasks.celery_app.celery_app beat --loglevel=info
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: jobrador-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: jobrador-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: jobrador-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: jobrador-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
      - key: GREENHOUSE_BOARDS
        value: ""
      - key: LEVER_COMPANIES
        value: ""
      - key: RATE_LIMIT_DEFAULT
        value: 60/minute
      - key: SCRAPE_INTERVAL_MINUTES
        value: "30"
      - key: SCRAPER_TIMEOUT_SECONDS
        value: "20"
      - key: MAX_RESUME_UPLOAD_BYTES
        value: "5242880"
      - key: MATCH_CACHE_TTL_SECONDS
        value: "3600"

  - type: web
    name: jobrador-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: keyvalue
    name: jobrador-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: jobrador-db
    plan: basic-256mb
    databaseName: jobrador
    user: jobrador
    postgresMajorVersion: "16"