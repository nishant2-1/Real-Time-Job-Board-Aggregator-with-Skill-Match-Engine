version: "3.9"

services:
	postgres:
		image: postgres:16-alpine
		container_name: jobrador-postgres
		restart: unless-stopped
		environment:
			POSTGRES_DB: ${POSTGRES_DB:-jobrador}
			POSTGRES_USER: ${POSTGRES_USER:-jobrador}
			POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobrador}
		ports:
			- "5432:5432"
		volumes:
			- postgres_data:/var/lib/postgresql/data
		healthcheck:
			test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobrador} -d ${POSTGRES_DB:-jobrador}"]
			interval: 10s
			timeout: 5s
			retries: 5

	redis:
		image: redis:7-alpine
		container_name: jobrador-redis
		restart: unless-stopped
		ports:
			- "6379:6379"
		command: ["redis-server", "--appendonly", "yes"]
		volumes:
			- redis_data:/data
		healthcheck:
			test: ["CMD", "redis-cli", "ping"]
			interval: 10s
			timeout: 5s
			retries: 5

	backend:
		build:
			context: ./backend
			dockerfile: Dockerfile
		container_name: jobrador-backend
		restart: unless-stopped
		env_file:
			- .env
		environment:
			PYTHONUNBUFFERED: "1"
		ports:
			- "8000:8000"
		volumes:
			- ./backend:/app
		depends_on:
			postgres:
				condition: service_healthy
			redis:
				condition: service_healthy
		command: >
			sh -c "alembic upgrade head &&
						 uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

	celery_worker:
		build:
			context: ./backend
			dockerfile: Dockerfile
		container_name: jobrador-celery-worker
		restart: unless-stopped
		env_file:
			- .env
		volumes:
			- ./backend:/app
		depends_on:
			postgres:
				condition: service_healthy
			redis:
				condition: service_healthy
		command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info

	celery_beat:
		build:
			context: ./backend
			dockerfile: Dockerfile
		container_name: jobrador-celery-beat
		restart: unless-stopped
		env_file:
			- .env
		volumes:
			- ./backend:/app
		depends_on:
			postgres:
				condition: service_healthy
			redis:
				condition: service_healthy
		command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info

	frontend:
		build:
			context: ./frontend
			dockerfile: Dockerfile
		container_name: jobrador-frontend
		restart: unless-stopped
		ports:
			- "5173:5173"
		volumes:
			- ./frontend:/app
			- /app/node_modules
		depends_on:
			- backend
		command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
	postgres_data:
	redis_data:
