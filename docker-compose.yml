version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: jobrador-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobrador}
      POSTGRES_USER: ${POSTGRES_USER:-jobrador}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobrador}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobrador} -d ${POSTGRES_DB:-jobrador}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobrador-network

  redis:
    image: redis:7
    container_name: jobrador-redis
    restart: unless-stopped
    env_file:
      - .env
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobrador-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobrador-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - jobrador-network

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobrador-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    networks:
      - jobrador-network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobrador-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info
    networks:
      - jobrador-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobrador-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3000
    networks:
      - jobrador-network

volumes:
  postgres-data:
  redis-data:

networks:
  jobrador-network:
    driver: bridge
